services:
  postgres:
    image: postgres:16-alpine
    container_name: honeypot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-honeypot_db}
      POSTGRES_USER: ${POSTGRES_USER:-honeypot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-honeypot}
    command:
      - postgres
      - -c
      - listen_addresses=*
      - -c
      - hba_file=/etc/postgresql/pg_hba.conf
    ports:
      - "${POSTGRES_BIND_ADDRESS:-0.0.0.0}:${HOST_POSTGRES_PORT:-15432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deploy/postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-honeypot} -d ${POSTGRES_DB:-honeypot_db}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend-api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: honeypot-backend-api
    user: "0:0"
    restart: unless-stopped
    environment:
      APP_PORT: ${APP_PORT:-15000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://127.0.0.1:15173,http://localhost:15173}
      SECRET_KEY: ${SECRET_KEY:-replace-with-random-secret}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-replace-with-random-jwt-secret}
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-honeypot}:${POSTGRES_PASSWORD:-honeypot}@postgres:5432/${POSTGRES_DB:-honeypot_db}
      LOGIN_MAX_ATTEMPTS: ${LOGIN_MAX_ATTEMPTS:-5}
      LOGIN_LOCK_MINUTES: ${LOGIN_LOCK_MINUTES:-15}
      INGEST_TOKEN: ${INGEST_TOKEN:-dev-ingest-token}
      SESSION_AGGREGATION_MINUTES: ${SESSION_AGGREGATION_MINUTES:-30}
      EVIDENCE_STORAGE_DRIVER: ${EVIDENCE_STORAGE_DRIVER:-local}
      EVIDENCE_LOCAL_PATH: ${EVIDENCE_LOCAL_PATH:-instance/evidence}
      GEOIP_ENABLED: ${GEOIP_ENABLED:-false}
      GEOIP_CITY_DB_PATH: ${GEOIP_CITY_DB_PATH:-instance/geoip/GeoLite2-City.mmdb}
      GEOIP_ASN_DB_PATH: ${GEOIP_ASN_DB_PATH:-instance/geoip/GeoLite2-ASN.mmdb}
      ADMIN_DEFAULT_USERNAME: ${ADMIN_DEFAULT_USERNAME:-admin}
      ADMIN_DEFAULT_PASSWORD: ${ADMIN_DEFAULT_PASSWORD:-Admin@123456}
      AUTO_CREATE_TABLES: ${AUTO_CREATE_TABLES:-false}
      HONEYPOT_CONTROL_TOKEN: ${HONEYPOT_CONTROL_TOKEN:-dev-ingest-token}
      HONEYPOT_ORCHESTRATION_ENABLED: ${HONEYPOT_ORCHESTRATION_ENABLED:-true}
      HONEYPOT_CONTROLLER_BASE_URL: ${HONEYPOT_CONTROLLER_BASE_URL:-http://backend-api:15000}
      HONEYPOT_CONTROLLER_PUBLIC_BASE_URL: ${HONEYPOT_CONTROLLER_PUBLIC_BASE_URL:-}
      HONEYPOT_DOCKER_NETWORK: ${HONEYPOT_DOCKER_NETWORK:-miragetrap-net}
      HONEYPOT_DOCKER_ADD_HOST_GATEWAY: ${HONEYPOT_DOCKER_ADD_HOST_GATEWAY:-true}
      HONEYPOT_HEARTBEAT_INTERVAL_SECONDS: ${HONEYPOT_HEARTBEAT_INTERVAL_SECONDS:-15}
      HONEYPOT_HEARTBEAT_TIMEOUT_SECONDS: ${HONEYPOT_HEARTBEAT_TIMEOUT_SECONDS:-45}
      HONEYPOT_STARTUP_VERIFY_SECONDS: ${HONEYPOT_STARTUP_VERIFY_SECONDS:-6}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-2}
      GUNICORN_THREADS: ${GUNICORN_THREADS:-4}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${HOST_APP_PORT:-15000}:15000"
    volumes:
      - backend_evidence_data:/app/instance/evidence
      - ./backend/instance/geoip:/app/instance/geoip:ro
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:15000/api/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5

  honeypot-cms:
    image: miragetrap/cn-cms-honeypot:latest
    build:
      context: .
      dockerfile: honeypots/chinese-web/cms/Dockerfile
    container_name: honeypot-cms
    restart: unless-stopped
    environment:
      WEB_HONEYPOT_PORT: 80
      INGEST_API_URL: ${HONEYPOT_CONTROLLER_PUBLIC_BASE_URL:-http://backend-api:15000}/api/ingest/events
      HEARTBEAT_API_URL: ${HONEYPOT_CONTROLLER_PUBLIC_BASE_URL:-http://backend-api:15000}/api/honeypots/heartbeat
      INGEST_TOKEN: ${INGEST_TOKEN:-dev-ingest-token}
      HONEYPOT_CONTROL_TOKEN: ${HONEYPOT_CONTROL_TOKEN:-dev-ingest-token}
      HONEYPOT_ID: ${CMS_HONEYPOT_ID:-hp-cn-cms-compose-001}
      HONEYPOT_NAME: ${CMS_HONEYPOT_NAME:-中文政务CMS-bootstrap}
      HONEYPOT_IMAGE_KEY: cn_cms_portal
      HONEYPOT_IMAGE_NAME: miragetrap/cn-cms-honeypot:latest
      HONEYPOT_CONTAINER_NAME: honeypot-cms
      HONEYPOT_PROFILE: cms
      HONEYPOT_EXPOSED_PORT: ${CMS_HONEYPOT_EXPOSED_PORT:-18080}
      HEARTBEAT_INTERVAL_SECONDS: ${HONEYPOT_HEARTBEAT_INTERVAL_SECONDS:-15}
      WEB_HONEYPOT_MAX_BODY: ${WEB_HONEYPOT_MAX_BODY:-4096}
    depends_on:
      backend-api:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${HOST_CMS_HONEYPOT_PORT:-18080}:80"

  honeypot-oa:
    image: miragetrap/cn-oa-honeypot:latest
    build:
      context: .
      dockerfile: honeypots/chinese-web/oa/Dockerfile
    container_name: honeypot-oa
    restart: unless-stopped
    environment:
      WEB_HONEYPOT_PORT: 80
      INGEST_API_URL: ${HONEYPOT_CONTROLLER_PUBLIC_BASE_URL:-http://backend-api:15000}/api/ingest/events
      HEARTBEAT_API_URL: ${HONEYPOT_CONTROLLER_PUBLIC_BASE_URL:-http://backend-api:15000}/api/honeypots/heartbeat
      INGEST_TOKEN: ${INGEST_TOKEN:-dev-ingest-token}
      HONEYPOT_CONTROL_TOKEN: ${HONEYPOT_CONTROL_TOKEN:-dev-ingest-token}
      HONEYPOT_ID: ${OA_HONEYPOT_ID:-hp-cn-oa-compose-001}
      HONEYPOT_NAME: ${OA_HONEYPOT_NAME:-中文OA办公-bootstrap}
      HONEYPOT_IMAGE_KEY: cn_oa_portal
      HONEYPOT_IMAGE_NAME: miragetrap/cn-oa-honeypot:latest
      HONEYPOT_CONTAINER_NAME: honeypot-oa
      HONEYPOT_PROFILE: oa
      HONEYPOT_EXPOSED_PORT: ${OA_HONEYPOT_EXPOSED_PORT:-18081}
      HEARTBEAT_INTERVAL_SECONDS: ${HONEYPOT_HEARTBEAT_INTERVAL_SECONDS:-15}
      WEB_HONEYPOT_MAX_BODY: ${WEB_HONEYPOT_MAX_BODY:-4096}
    depends_on:
      backend-api:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${HOST_OA_HONEYPOT_PORT:-18081}:80"

  honeypot-gateway:
    image: miragetrap/cn-iot-gateway-honeypot:latest
    build:
      context: .
      dockerfile: honeypots/chinese-web/gateway/Dockerfile
    container_name: honeypot-gateway
    restart: unless-stopped
    environment:
      WEB_HONEYPOT_PORT: 80
      INGEST_API_URL: ${HONEYPOT_CONTROLLER_PUBLIC_BASE_URL:-http://backend-api:15000}/api/ingest/events
      HEARTBEAT_API_URL: ${HONEYPOT_CONTROLLER_PUBLIC_BASE_URL:-http://backend-api:15000}/api/honeypots/heartbeat
      INGEST_TOKEN: ${INGEST_TOKEN:-dev-ingest-token}
      HONEYPOT_CONTROL_TOKEN: ${HONEYPOT_CONTROL_TOKEN:-dev-ingest-token}
      HONEYPOT_ID: ${GATEWAY_HONEYPOT_ID:-hp-cn-gateway-compose-001}
      HONEYPOT_NAME: ${GATEWAY_HONEYPOT_NAME:-中文工控网关-bootstrap}
      HONEYPOT_IMAGE_KEY: cn_iot_gateway
      HONEYPOT_IMAGE_NAME: miragetrap/cn-iot-gateway-honeypot:latest
      HONEYPOT_CONTAINER_NAME: honeypot-gateway
      HONEYPOT_PROFILE: gateway
      HONEYPOT_EXPOSED_PORT: ${GATEWAY_HONEYPOT_EXPOSED_PORT:-18082}
      HEARTBEAT_INTERVAL_SECONDS: ${HONEYPOT_HEARTBEAT_INTERVAL_SECONDS:-15}
      WEB_HONEYPOT_MAX_BODY: ${WEB_HONEYPOT_MAX_BODY:-4096}
    depends_on:
      backend-api:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${HOST_GATEWAY_HONEYPOT_PORT:-18082}:80"

volumes:
  postgres_data:
  backend_evidence_data:

networks:
  default:
    name: miragetrap-net
