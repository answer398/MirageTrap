# MirageTrap PostgreSQL remote access policy.
# Keep password auth enabled and let Docker expose the port on the host.
# For public deployments, still restrict 15432 with a firewall or security group.

local   all             all                                     trust
host    all             all             127.0.0.1/32            scram-sha-256
host    all             all             ::1/128                 scram-sha-256
host    all             all             0.0.0.0/0               scram-sha-256
host    all             all             ::/0                    scram-sha-256
